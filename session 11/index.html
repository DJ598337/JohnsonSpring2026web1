<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Dress Your Own Doll</title>
		<meta charset="utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="styles.css" />
		<script src="script.js" defer></script>
	</head>

	<body>
		<div id="page">
			<h1>Dress Your Own Doll</h1>
			<div id="left-container" class="container">
				<div class="clothes">
					<img class="items" alt="items" id="necklace 4" src="./images/necklace 4.png" />
				</div>
				<div class="clothes">
					<img class="items" alt="items" id="sunglasses 2" src="./images/sunglasses 2.png" />
				</div>
				<div class="clothes">
					<img class="items" alt="items" id="sunglasses 1" src="./images/sunglasses 1.png" />
				</div>
				<div class="clothes">
					<img class="items" alt="items" id="shirt 1" src="./images/shirt 1.png" />
				</div>
				<div class="clothes">
					<img class="items" alt="items" id="shirt 2" src="./images/shirt 2.png" />
				</div>
				<div class="clothes">
					<img class="items" alt="items" id="shirt 3" src="./images/shirt 3.png" />
				</div>
				<div class="clothes">
					<img class="items" alt="items" id="pants 4" src="./images/pants 4.png" />
				</div>
			</div>
			<div id="right-container" class="container">
				<div class="clothes">
					<img class="items" alt="items" id="pants 5" src="./images/pants 5.png" />
				</div>
				<div class="clothes">
					<img class="items" alt="items" id="dress 6" src="./images/dress 6.png" />
				</div>
				<div class="clothes">
					<img class="items" alt="items" id="dress 7" src="./images/dress 7.png" />
				</div>
				<div class="clothes">
					<img class="items" alt="items" id="necklace 5" src="./images/necklace 5.png" />
				</div>
				<div class="clothes">
					<img class="items" alt="items" id="necklace 6" src="./images/necklace 6.png" />
				</div>
				<div class="clothes">
					<img class="items" alt="items" id="necklace 7" src="./images/necklace 7.png" />
				</div>
				<div class="clothes">
					<img class="items" alt="items" id="images" src="./images/images.png" />
				</div>
			</div>

			<div>
				<div class="background-top"></div>
				<div class="background-walls">
					<div class="background-long"></div>
					<div class="background-short"></div>
					<img
						class="doll-base"
						alt="doll"
						src="images/doll.png"
					/>
				</div>
				<div class="floor"></div>
				<div class="background-bottom"></div>
			</div>
		</div>
	</body>
</html>
